name: Сообщить об ошибке
description: Сообщите о проблеме в русификаторе
title: "[Ошибка] "
# При выпуске новой версии обновите этот список в том же коммите.
# Для другой игры создайте отдельный шаблон со своим списком версий.
body:
  - type: dropdown
    id: game
    attributes:
      label: Игра
      options:
        - Train 45
    validations:
      required: true

  - type: dropdown
    id: loader-version
    attributes:
      label: Версия русификатора
      options:
        - "1.1.7"
        - "1.1.6"
        - "1.1.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Описание
      placeholder: Опишите, что произошло и как воспроизвести ошибку.
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Скриншот
      description: При необходимости перетащите сюда изображение.
    validations:
      required: false
